<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin panel for managing tasks — add, edit, and delete tasks." />
  <title>Task Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <span class="brand-icon">⚙️</span>
      <div>
        <h1>Task Admin Panel</h1>
        <span class="brand-badge">Full Access</span>
      </div>
    </div>
    <div class="header-actions">
      <span class="api-status" id="apiStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
      </span>
      <span class="admin-user-label" id="adminUserName"></span>
      <button class="logout-btn-admin" onclick="logout()">Logout</button>
      <a href="/admin/projects.html" class="view-dashboard-btn" style="background:var(--accent); color: #fff; border:none; margin-right: 10px;">
        📁 Manage Projects
      </a>
      <a href="/admin/users.html" class="view-dashboard-btn" style="background:var(--accent); color: #fff; border:none; margin-right: 10px;">
        👥 Manage Users
      </a>
      <a href="/" target="_blank" class="view-dashboard-btn">
        📋 View Dashboard
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <div class="layout">

    <!-- FORM PANEL -->
    <aside class="form-panel">
      <div class="panel-header">
        <h2 id="formTitle">➕ Add New Task</h2>
        <button class="cancel-btn hidden" id="cancelEditBtn" onclick="cancelEdit()">✕ Cancel</button>
      </div>

      <form id="taskForm" onsubmit="handleSubmit(event)">
        <input type="hidden" id="taskId" />

        <div class="form-group">
          <label for="taskName">Task Name <span class="required">*</span></label>
          <input type="text" id="taskName" placeholder="e.g. Deploy to production" required />
        </div>

        <div class="form-group">
          <label for="assignedTo">Assigned To <span class="required">*</span></label>
          <select id="assignedTo">
            <option value="">-- Select Assignee --</option>
          </select>
        </div>

        <div class="form-group">
          <label for="project">Project / Group</label>
          <select id="project">
            <option value="">-- No Project --</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="startDateTime">Start Date & Time <span class="required">*</span></label>
            <input type="datetime-local" id="startDateTime" required />
          </div>
          <div class="form-group">
            <label for="deadline">Deadline <span class="required">*</span></label>
            <input type="datetime-local" id="deadline" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="estimatedHours">Estimated Time (Hours)</label>
            <input type="number" id="estimatedHours" placeholder="e.g. 5.5" step="0.5" min="0" />
          </div>
          <div class="form-group">
            <label for="endTime">End Time (Optional)</label>
            <input type="datetime-local" id="endTime" />
          </div>
        </div>

        <div class="form-group">
          <label for="priority">Priority <span class="required">*</span></label>
          <select id="priority" required>
            <option value="">Select priority</option>
            <option value="High">🔴 High</option>
            <option value="Medium">🟠 Medium</option>
            <option value="Low">🟢 Low</option>
          </select>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px;">
          <input type="checkbox" id="isBillable" style="width: auto;" />
          <label for="isBillable" style="margin-bottom: 0;">Task is Billable</label>
        </div>

        <div class="form-group">
          <label for="tags">Tags <span style="font-weight:400; color:#6b7280;">(comma-separated, e.g. bug, frontend)</span></label>
          <input type="text" id="tags" placeholder="e.g. bug, design, backend" />
        </div>
        
        <div class="form-group">
          <label for="blockedBy">Blocked By (Dependencies)</label>
          <select id="blockedBy" multiple style="height: 120px;">
            <!-- Options will be populated dynamically -->
          </select>
          <small style="color: var(--text-muted); font-size: 0.7rem; margin-top: 4px;">Hold Ctrl (or Cmd) to select multiple</small>
        </div>

        <fieldset class="form-fieldset">
          <legend>Attachment (Optional)</legend>
          <div class="form-group">
            <label for="fileName">File Name</label>
            <input type="text" id="fileName" placeholder="e.g. report_v2.pdf" />
          </div>
          <div class="form-group">
            <label for="downloadUrl">Download URL</label>
            <input type="url" id="downloadUrl" placeholder="https://example.com/file.pdf" />
          </div>
        </fieldset>

        <div class="form-group">
          <label for="adminActivityComment">Add a comment (optional)</label>
          <textarea id="adminActivityComment" placeholder="Add a comment (e.g. initial instructions or context)" rows="3"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span>➕ Add Task</span>
        </button>
      </form>
    </aside>

    <!-- TASK LIST PANEL -->
    <main class="list-panel">
      <div class="list-header">
        <div class="list-title-row">
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="selectAllTasks" onchange="toggleSelectAll(this.checked)" />
            <label for="selectAllTasks" style="margin-bottom: 0; font-size: 0.7rem; cursor: pointer;">Select All</label>
          </div>
          <h2>All Tasks <span class="task-count-badge" id="taskCount">0</span></h2>
          <div class="list-controls">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search tasks..." oninput="renderTasks()" />
            <select id="filterPriority" class="filter-select" onchange="renderTasks()">
              <option value="All">All Priorities</option>
              <option value="High">🔴 High</option>
              <option value="Medium">🟠 Medium</option>
              <option value="Low">🟢 Low</option>
            </select>
          </div>
        </div>
      </div>

      <div id="taskList" class="task-list">
        <div class="loading-skeleton">
          <div class="skel-card"></div>
          <div class="skel-card"></div>
          <div class="skel-card"></div>
        </div>
      </div>

      <!-- BULK ACTION BAR -->
      <div id="bulkActionBar" class="bulk-action-bar hidden">
        <div class="bulk-info">
          <span id="selectedCount">0</span> tasks selected
        </div>
        <div class="bulk-controls">
          <div class="bulk-control-group">
            <select id="bulkAssignedTo" class="bulk-select">
              <option value="">Reassign to...</option>
            </select>
            <button class="bulk-apply-btn" onclick="handleBulkAction('reassign')">Reassign</button>
          </div>
          <div class="bulk-control-group">
            <select id="bulkStatus" class="bulk-select">
              <option value="">Change status...</option>
              <option value="Not Started">Not Started</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
              <option value="Blocked">Blocked</option>
            </select>
            <button class="bulk-apply-btn" onclick="handleBulkAction('status_change')">Update Status</button>
          </div>
          <button class="bulk-delete-btn" onclick="handleBulkAction('delete')">🗑️ Delete Selected</button>
          <button class="bulk-cancel-btn" onclick="clearSelection()">Cancel</button>
        </div>
      </div>
    </main>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon">🗑️</div>
      <h3>Delete Task?</h3>
      <p id="modalMessage">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="cancel-modal-btn" onclick="closeModal()">Cancel</button>
        <button class="confirm-delete-btn" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast hidden" id="toast">
    <span id="toastMessage"></span>
  </div>

  <script src="admin.js"></script>
</body>
</html>
